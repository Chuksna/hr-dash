const fmtK  = n => `$${Math.round(n/1000)}k`;

function parseCSV(text) {
  const lines = text.trim().split("\n");
  if (lines.length < 2) return [];
  const headers = lines[0].split(",").map(h => h.trim().replace(/"/g,""));
  return lines.slice(1).map(line => {
    const cols=[], cur=[];let inQ=false;
    for(let ch of line){if(ch==='"'){inQ=!inQ;}else if(ch===','&&!inQ){cols.push(cur.join('').trim());cur.length=0;}else cur.push(ch);}
    cols.push(cur.join('').trim());
    const row={};
    headers.forEach((h,i)=>{ row[h]=(cols[i]||'').replace(/"/g,'').trim(); });
    return row;
  });
}

function groupBy(arr, key) {
  const m={};
  arr.forEach(r=>{const k=r[key]||'Unknown';if(!m[k])m[k]=[];m[k].push(r);});
  return m;
}

// ─────────────────────────────────────────────
//  SIMPLE CHART HELPERS  (pure SVG, no deps)
// ─────────────────────────────────────────────
function BarH({data, labelKey, valueKey, colors, height=220, maxVal}){
  const mx = maxVal || Math.max(...data.map(d=>d[valueKey]));
  const barH = Math.floor((height - data.length*6) / data.length);
  return `<svg width="100%" height="${height}" viewBox="0 0 400 ${height}" preserveAspectRatio="xMidYMid meet">
    ${data.map((d,i)=>{
      const w = Math.round((d[valueKey]/mx)*300);
      const y = i*(barH+6);
      const col = Array.isArray(colors) ? colors[i%colors.length] : colors;
      return `<g>
        <text x="0" y="${y+barH/2+5}" fill="#94A3B8" font-size="11" font-family="DM Sans,sans-serif">${d[labelKey]}</text>
        <rect x="100" y="${y}" width="${w}" height="${barH}" rx="4" fill="${col}" opacity=".85"/>
        <text x="${104+w}" y="${y+barH/2+5}" fill="#64748B" font-size="11" font-family="DM Sans,sans-serif">${d[valueKey]}</text>
      </g>`;
    }).join('')}
  </svg>`;
}

const { useState, useEffect, useMemo } = React;

// ── CSV fetcher hook ──
function useSheet(url) {
  const [data,setData]   = useState([]);
  const [loading,setLoading] = useState(false);
  const [error,setError] = useState(null);
  const [updated,setUpdated] = useState(null);
  const isDemo = !url || url.startsWith("YOUR_");

  const fetch_ = async () => {
    if(isDemo){return;}
    setLoading(true);
    try{
      const r = await fetch(url+"&t="+Date.now());
      if(!r.ok) throw new Error("Could not load sheet");
      const t = await r.text();
      const parsed = parseCSV(t).map(row=>{
        const out={...row};
        ['salary','tenure','internal','market','headcount'].forEach(k=>{if(out[k])out[k]=parseFloat(out[k])||0;});
        return out;
      });
      setData(parsed); setUpdated(new Date()); setError(null);
    }catch(e){setError(e.message);}
    setLoading(false);
  };

  useEffect(()=>{fetch_();const t=setInterval(fetch_,5*60*1000);return()=>clearInterval(t);},[url]);
  return {data, loading, error, updated, refresh:fetch_, isDemo};
}

  );
}

// ─────────────────────────────────────────────
//  LOGIN
// ─────────────────────────────────────────────
function Login({onLogin}){
  const [pw,setPw]=useState('');
  const [err,setErr]=useState('');
  const go = ()=>{
    if(pw===CONFIG.password){sessionStorage.setItem('hr_ok','1');onLogin();}
    else{setErr('Incorrect password, try again.');setPw('');}
  };
  return React.createElement('div',{className:'login-wrap'},
    React.createElement('div',{className:'login-box'},
      React.createElement('div',{className:'login-emoji'},'📊'),
      React.createElement('h1',{className:'login-title'},'HR People Intelligence'),
      React.createElement('p',{className:'login-sub'},'Enter your team password to continue'),
      React.createElement('input',{className:'login-input',type:'password',placeholder:'Password',value:pw,
        onChange:e=>setPw(e.target.value),onKeyDown:e=>e.key==='Enter'&&go(),autoFocus:true}),
      React.createElement('button',{className:'login-btn',onClick:go},'Access Dashboards →'),
      err && React.createElement('div',{className:'login-err'},err)
    )
  );
}

// ─────────────────────────────────────────────
//  ROOT APP
// ─────────────────────────────────────────────
function App(){
  const [authed,setAuthed] = useState(!!sessionStorage.getItem('hr_ok'));
  const [tab,setTab]       = useState('employees');
  if(!authed) return React.createElement(Login,{onLogin:()=>setAuthed(true)});
  const logout = ()=>{sessionStorage.removeItem('hr_ok');setAuthed(false);};
  return React.createElement('div',null,
    React.createElement('nav',{className:'nav'},
      React.createElement('div',{className:'nav-logo'},
        React.createElement('span',{className:'nav-badge'},'HR'),
        'People Intelligence'
      ),
      React.createElement('div',{className:'nav-links'},
        React.createElement('button',{className:'nav-btn '+(tab==='employees'?'active':''),onClick:()=>setTab('employees')},'👥 Employee Analytics'),
        React.createElement('button',{className:'nav-btn '+(tab==='comp'?'active':''),onClick:()=>setTab('comp')},'💰 Comp Benchmark'),
        React.createElement('button',{className:'nav-btn '+(tab==='setup'?'active':''),onClick:()=>setTab('setup')},'⚙️ Setup Guide'),
      ),
      React.createElement('button',{className:'logout-btn',onClick:logout},'Log out')
    ),
    tab==='employees' && React.createElement(EmployeeDashboard),
    tab==='comp'      && React.createElement(CompDashboard),
    tab==='setup'     && React.createElement(SetupGuide)
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
